<!DOCTYPE html>
<html lang="lt" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokėjimas atšauktas - Medijus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://js-de.sentry-cdn.com/e65b09ebdc7e2b3188cdae22b00067cc.min.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tailwind.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 flex items-center justify-center px-4">

    <div class="max-w-md w-full text-center">
        <!-- Icon -->
        <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">Mokėjimas atšauktas</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8">Užsakymas nebuvo apmokėtas. Galite bandyti dar kartą.</p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="kurejai.html"
               class="bg-primary hover:bg-primary-hover text-white px-6 py-3 font-semibold rounded-md">
                Grįžti į kūrėjus
            </a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('darkMode') === 'true' ||
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="js/cookie-consent.js"></script>
</body>
</html>
