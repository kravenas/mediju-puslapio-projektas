<!DOCTYPE html>
<html lang="lt" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokėjimas sėkmingas - Artifex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/dist/umd/supabase.min.js" integrity="sha384-sfbOag7cEcqn2DK53T/iBNAH/2cMCf7bSzJDwBhV117A0z/NIj9Usei1jKIBY1Ae" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#FFC50F', 'primary-hover': '#E6B00F' } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 flex items-center justify-center px-4">

    <div class="max-w-md w-full text-center">
        <!-- Icon -->
        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">Mokėjimas sėkmingas!</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-2">Jūsų užsakymas priimtas.</p>
        <p id="order-info" class="text-sm text-gray-400 dark:text-gray-500 mb-8"></p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="kurejai.html"
               class="bg-primary hover:bg-primary-hover text-white px-6 py-3 font-semibold rounded-md">
                Grįžti į kūrėjus
            </a>
            <a href="profilis.html"
               class="border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 px-6 py-3 font-semibold rounded-md">
                Mano profilis
            </a>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order');
        if (orderId) {
            document.getElementById('order-info').textContent = 'Užsakymo nr.: ' + orderId;
        }

        // Apply saved dark mode
        if (localStorage.getItem('darkMode') === 'true' ||
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
