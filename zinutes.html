<!DOCTYPE html>
<html lang="lt" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Žinutės - Artifex</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FFC50F',
                        'primary-hover': '#E6B00F',
                        secondary: '#DBDBDB',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/chat.css">
    <style>
        :root {
            --font-heading: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
        h1,h2,h3,h4,h5,h6 { font-family: var(--font-heading); font-weight: 700; line-height: 1.2; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white dark:bg-gray-900 border-b border-secondary dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="flex items-center gap-3">
                        <div class="flex items-center justify-center" style="width: 48px; height: 48px;">
                            <span style="font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 600; font-style: italic; color: #FFC50F; line-height: 1;">A</span>
                        </div>
                        <span style="font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; letter-spacing: 0.1em;" class="text-gray-900 dark:text-white">ARTIFEX</span>
                    </a>
                </div>

                <div class="hidden lg:flex items-center space-x-8">
                    <a href="kurejai.html" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white font-medium">Kūrėjai</a>
                    <a href="kylancios-zvaigzdes.html" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white font-medium">Naujokai</a>
                    <a href="zinutes.html" class="text-primary font-semibold">Žinutės</a>
                    <a href="planai.html" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white font-medium">Planai</a>
                </div>

                <div class="flex items-center space-x-4">
                    <button id="theme-toggle" class="p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-800" style="border-radius:4px;">
                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-400 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-400 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                    <div class="auth-nav-buttons flex items-center space-x-4">
                        <a href="prisijungimas.html" class="hidden sm:block text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white font-medium">Prisijungti</a>
                        <a href="prisijungimas.html?tab=register" class="bg-primary hover:bg-primary-hover text-white px-6 py-2.5 font-medium" style="border-radius:4px;">Registruotis</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Chat layout -->
    <div class="chat-layout pt-16">

        <!-- Sidebar: conversation list -->
        <div class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h2 class="text-lg font-bold text-gray-900 dark:text-white">Žinutės</h2>
            </div>
            <div class="chat-sidebar-list" id="chat-conv-list">
                <div class="flex items-center justify-center h-32 text-gray-400 text-sm">Kraunama...</div>
            </div>
        </div>

        <!-- Main chat area -->
        <div class="chat-main">
            <!-- Empty state (no conversation selected) -->
            <div id="chat-empty-state" class="chat-empty">
                <svg class="w-16 h-16 opacity-30" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                <p class="text-sm font-medium">Pasirinkite pokalbį</p>
                <p class="text-xs">arba pradėkite naują iš kūrėjo profilio</p>
            </div>

            <!-- Active chat (hidden by default) -->
            <div id="chat-active" class="hidden flex flex-col h-full">
                <!-- Header -->
                <div class="chat-main-header" id="chat-header"></div>
                <!-- Messages -->
                <div class="chat-messages" id="chat-messages"></div>
                <!-- Input -->
                <div class="chat-input-area">
                    <textarea id="chat-input" class="chat-input" rows="1" placeholder="Rašykite žinutę..."></textarea>
                    <button id="chat-send-btn" class="chat-send-btn" title="Siųsti">
                        <svg width="18" height="18" fill="none" stroke="#111827" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const saved = localStorage.getItem('artifex-theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            const dark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('artifex-theme', dark ? 'dark' : 'light');
        });
    </script>
    <script src="js/chat.js"></script>
</body>
</html>
