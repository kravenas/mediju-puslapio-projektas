<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Medijus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 600px; position: relative; z-index: 1; }

        /* Decorative camera art on the right — faded into the page */
        .bg-art {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            height: 104vh;
            max-width: 52vw;
            object-fit: contain;
            object-position: right center;
            opacity: 0.28;
            filter: blur(2px);
            pointer-events: none;
            z-index: 0;
            -webkit-mask-image: linear-gradient(to left, #000 50%, transparent 96%);
            mask-image: linear-gradient(to left, #000 50%, transparent 96%);
            animation: artFade 2s ease-out 0.3s both;
        }
        @keyframes artFade { from { opacity: 0; } to { opacity: 0.28; } }
        @media (max-width: 768px) {
            .bg-art { max-width: 96vw; opacity: 0.13; height: 70vh; top: auto; bottom: 0; transform: none; }
            @keyframes artFade { from { opacity: 0; } to { opacity: 0.13; } }
        }
        @media (prefers-reduced-motion: reduce) {
            .bg-art { animation: none; }
        }
        .lockup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 1.5rem;
        }
        .mark {
            width: clamp(3.4rem, 9vw, 5.4rem);
            height: clamp(3.4rem, 9vw, 5.4rem);
            flex-shrink: 0;
            display: block;
        }

        /* Staggered fade-in on load */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .mark, .logo, .tagline, .soon, .contact {
            opacity: 0;
            animation: fadeUp 0.85s cubic-bezier(.2,.7,.2,1) forwards;
        }
        .mark    { animation-delay: 0.15s; }
        .logo    { animation-delay: 0.4s; }
        .tagline { animation-delay: 0.75s; }
        .soon    { animation-delay: 1.1s; }
        .contact { animation-delay: 1.45s; }
        @media (prefers-reduced-motion: reduce) {
            .mark, .logo, .tagline, .soon, .contact {
                animation: none; opacity: 1; transform: none;
            }
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.75rem, 8vw, 4.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .tagline {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #a3a3a3;
            line-height: 1.6;
            font-weight: 400;
        }
        .tagline strong { color: #D4A017; font-weight: 500; }
        .soon {
            display: inline-block;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #D4A017;
            border: 1px solid rgba(212, 160, 23, 0.4);
            border-radius: 999px;
            padding: 0.55rem 1.2rem;
        }
        .contact {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #525252;
        }
        .contact a { color: #D4A017; text-decoration: none; font-weight: 500; }
        .contact a:hover { color: #e9c14e; }
    </style>
</head>
<body>
    <img class="bg-art" src="camera-art.jpg" alt="" aria-hidden="true">
    <main class="wrap">
        <div class="lockup">
            <svg class="mark" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Medijus logotipas">
                <defs>
                    <linearGradient id="m" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0.4)"/>
                    </linearGradient>
                    <linearGradient id="dm" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
                        <stop offset="50%" stop-color="rgba(200,200,200,0.8)"/>
                        <stop offset="100%" stop-color="rgba(128,128,128,0.6)"/>
                    </linearGradient>
                </defs>
                <path d="M 22 18 L 12 18 L 12 62 L 22 62" fill="none" stroke="url(#m)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 58 18 L 68 18 L 68 62 L 58 62" fill="none" stroke="url(#m)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="22" y1="18" x2="40" y2="28" stroke="url(#m)" stroke-width="5" stroke-linecap="round"/>
                <line x1="58" y1="18" x2="40" y2="28" stroke="url(#m)" stroke-width="5" stroke-linecap="round"/>
                <polygon points="40,28 52,40 40,52 28,40" fill="url(#dm)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linejoin="round"/>
                <polygon points="40,28 52,40 40,40" fill="rgba(255,255,255,0.6)"/>
                <polygon points="40,28 28,40 40,40" fill="rgba(255,255,255,0.3)"/>
            </svg>
            <span class="logo">Medijus</span>
        </div>
        <p class="tagline">Vieta, kur <strong>fotografai, videografai ir dizaineriai</strong> sutinka savo klientus. Medijų skelbimo portalas vienoje vietoje.</p>
        <span class="soon">Greitai</span>
        <p class="contact">Klausimai? <a href="mailto:info@medijus.lt">info@medijus.lt</a></p>
    </main>
</body>
</html>
