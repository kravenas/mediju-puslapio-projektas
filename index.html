<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Medijus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 560px; }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 600;
            letter-spacing: 0.12em;
            margin-bottom: 1.25rem;
        }
        .tagline {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #a3a3a3;
            line-height: 1.6;
            font-weight: 400;
        }
        .soon {
            display: inline-block;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #6b7280;
            border: 1px solid #262626;
            border-radius: 999px;
            padding: 0.55rem 1.2rem;
        }
        .contact {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #525252;
        }
        .contact a { color: #a3a3a3; text-decoration: none; }
        .contact a:hover { color: #fff; }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="logo">MEDIJUS</div>
        <p class="tagline">Netrukus čia gyvuos vieta, kur susitinka Lietuvos kūrėjai ir jų klientai.</p>
        <span class="soon">Greitai</span>
        <p class="contact">Klausimai? <a href="mailto:info@medijus.lt">info@medijus.lt</a></p>
    </main>
</body>
</html>
